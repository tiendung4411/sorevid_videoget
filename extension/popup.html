<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOREVID VideoGET</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon.png" alt="" />
        <div>
          <strong>SOREVID VideoGET</strong>
          <span id="platform">Checking current tab…</span>
        </div>
        <select id="language" class="language-select" aria-label="Language">
          <option value="en">EN</option>
          <option value="vi">VI</option>
        </select>
      </header>
      <section class="page-card">
        <strong id="title">Current page</strong>
        <span id="url"></span>
      </section>
      <section id="scan-options" class="scan-options" hidden>
        <label>
          <span id="scan-mode-label">Scan mode</span>
          <select id="scan-mode">
            <option value="safe" selected>Safe recommended</option>
            <option value="slow">Slow cautious</option>
            <option value="fast">Fast</option>
          </select>
        </label>
        <label>
          <span id="scan-limit-label">Scan limit</span>
          <select id="scan-limit">
            <option value="10">10 videos</option>
            <option value="20" selected>20 videos</option>
            <option value="50">50 videos</option>
            <option value="100">100 videos</option>
            <option value="0">All visible videos</option>
          </select>
        </label>
      </section>
      <div id="status" class="status idle">Ready to send this page to the desktop app.</div>
      <button id="send" type="button">Open in VideoGET</button>
      <button id="scan" type="button" class="secondary" hidden>Scan TikTok Profile</button>
      <button id="scan-drama" type="button" class="secondary" hidden>Scan Short Drama</button>
      <button id="download-series" type="button" class="secondary" hidden>Download Full Series</button>
      <button id="run-pending" type="button" class="secondary">Run pending repairs</button>
      <p id="helper-text">SOREVID VideoGET will open and fill the URL. Review your download options there.</p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
